<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7950F2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圓角方形背景 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- 聽診器圖示（白色線條） -->
  <!-- 耳管（Y形上端） -->
  <line x1="168" y1="88" x2="168" y2="140" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="344" y1="88" x2="344" y2="140" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- 耳管圓頭 -->
  <circle cx="168" cy="80" r="14" fill="white"/>
  <circle cx="344" cy="80" r="14" fill="white"/>
  <!-- 連接弧形（頂部） -->
  <path d="M168 140 Q168 170 256 170 Q344 170 344 140" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- 主管（從中央往下彎） -->
  <path d="M256 170 Q256 230 256 255" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- 大彎曲到聽診頭 -->
  <path d="M256 255 Q256 340 200 340 Q144 340 144 285 Q144 240 185 240" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 聽診頭（膜型） -->
  <circle cx="185" cy="230" r="34" fill="none" stroke="white" stroke-width="18"/>
  <circle cx="185" cy="230" r="14" fill="white" opacity="0.5"/>

  <!-- MedLingo 文字 -->
  <text
    x="256" y="430"
    font-family="'Microsoft JhengHei', 'PingFang TC', -apple-system, sans-serif"
    font-size="62"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
  >MedLingo</text>
</svg>
